name: unsigned-internal-package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  package:
    name: UNSIGNED-INTERNAL (${{ matrix.platform }})
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - runner: macos-15
            platform: macos-arm64
          - runner: windows-2022
            platform: windows-x64
          - runner: ubuntu-22.04
            platform: linux-x64
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: npm
          cache-dependency-path: |
            package-lock.json
            desktop/package-lock.json
      - name: Install dependencies
        shell: bash
        run: |
          npm ci
          npm --prefix desktop ci
      - name: Build and smoke unsigned internal package
        shell: bash
        run: npm --prefix desktop run package:verify
      - name: Mark artifact as unsigned and internal
        shell: bash
        run: |
          node -e "require('node:fs').writeFileSync('desktop/dist/UNSIGNED-INTERNAL.txt', 'UNSIGNED-INTERNAL: not for distribution\n')"
      - name: Upload short-lived internal artifact
        uses: actions/upload-artifact@v4
        with:
          name: UNSIGNED-INTERNAL-${{ matrix.platform }}
          path: desktop/dist
          if-no-files-found: error
          retention-days: 7
