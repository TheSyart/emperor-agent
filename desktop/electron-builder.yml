appId: com.emperor.agent.desktop
productName: Emperor Agent

directories:
  output: dist

beforePack: scripts/before-pack.cjs
afterPack: scripts/after-pack.cjs

files:
  - out/**/*
  - package.json
  - '!node_modules{,/**/*}'

extraResources:
  - from: build/icon.png
    to: icon.png
  - from: ../templates
    to: runtime-defaults/templates
    filter:
      - SOUL.md
      - TOOL.md
      - agent/compact_prompt.md
      - agent/identity.md
      - agent/skills_section.md
      - init/MEMORY.md
      - init/USER.md
      - subagents/dongchang_tanshi.md
      - subagents/neiguan_yingzao.md
      - subagents/shangbao_dianbu.md
      - subagents/sili_suitang.md
      - subagents/verification_reviewer.md
      - subagents/xiaohuangmen.md
  - from: ../skills
    to: runtime-defaults/skills
  - from: ../assets/desktop-pet
    to: runtime-defaults/assets/desktop-pet
  - from: ../config/examples/model_config.example.json
    to: runtime-defaults/model_config.example.json
  - from: ../config/examples/mcp_config.example.json
    to: runtime-defaults/mcp_config.example.json
  - from: ../.env.example
    to: runtime-defaults/.env.example
  - from: build/runtime-defaults-manifest.json
    to: runtime-defaults/runtime-manifest.json
  - from: src/pet
    to: desktop-pet
    filter:
      - renderer.html
      - renderer.css
      - renderer.js
      - preload.js
      - event-mapper.js
      - idle-scenes.js

asar: true

mac:
  target:
    - dmg
    - zip
  category: public.app-category.productivity
  icon: build/icon.png
  artifactName: Emperor-Agent-${version}-mac-${arch}.${ext}

win:
  target:
    - nsis
  artifactName: Emperor-Agent-${version}-win-${arch}.${ext}

linux:
  target:
    - AppImage
  executableName: emperor-agent
  icon: build/icon.png
  category: Utility
  artifactName: Emperor-Agent-${version}-linux-${arch}.${ext}

# Release builds host CoreApi in the Electron main process and read signed
# runtime defaults directly from the application resources directory.
